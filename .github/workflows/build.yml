name: Build Windows EXE
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install C++ Build Tools (Essential for dlib)
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          
      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller darkdetect  # darkdetect is often missed by customtkinter

      - name: Download Face Predictor Model (100MB)
        run: |
          curl -L -o shape_predictor_68_face_landmarks.dat https://github.com/italojs/facetracker/raw/master/data/shape_predictor_68_face_landmarks.dat

      - name: The "500 IQ" Compilation
        run: |
          pyinstaller --onefile --noconsole `
          --collect-all mediapipe `
          --collect-all customtkinter `
          --hidden-import=darkdetect `
          --add-data "shape_predictor_68_face_landmarks.dat;." `
          new_ui.py

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Gesture-Security-System-Final
          path: dist/*.exe
