name: Build Windows EXE
on: [push]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install C++ Build Tools (for dlib)
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Face Predictor Model
        run: |
          curl -L -o shape_predictor_68_face_landmarks.dat https://github.com/italojs/facetracker/raw/master/data/shape_predictor_68_face_landmarks.dat

      - name: Build Executable
        run: |
          pyinstaller --onefile --noconsole --collect-all mediapipe --add-data "shape_predictor_68_face_landmarks.dat;." new_ui.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Gesture-Security-System
          path: dist/*.exe
